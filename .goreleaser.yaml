version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: Harlockius
      name: homebrew-nmail
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: "https://github.com/Harlockius/nmail"
    description: "CLI for Korean email services (Naver, Daum). Designed for AI agents."
    license: "MIT"
    install: |
      bin.install "nmail"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
